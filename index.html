<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El-hnafy AI | خبير البرمجة والتقنية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050810; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        pre, code { font-family: 'Fira Code', monospace; direction: ltr; text-align: left; }
        .code-block { background: #1e1e2e; border-radius: 8px; padding: 15px; overflow-x: auto; margin: 10px 0; }
    </style>
</head>
<body class="text-gray-100 min-h-screen p-4 flex flex-col items-center">

    <header class="text-center my-10">
        <h1 class="text-5xl font-black gradient-text mb-2">El-hnafy AI</h1>
        <p class="text-gray-400 text-sm">خبير البرمجة والتكنولوجيا والأمن السيبراني</p>
    </header>

    <main class="w-full max-w-2xl">
        <div id="resultBox" class="hidden glass rounded-2xl p-6 shadow-xl border-r-4 border-blue-500 mb-6">
            <div class="flex items-center justify-between mb-4">
                <span class="text-blue-400 font-bold flex items-center gap-2">💻 رد الحنفي:</span>
                <button onclick="copyText()" class="text-xs bg-gray-700 px-2 py-1 rounded hover:bg-gray-600">نسخ الإجابة</button>
            </div>
            <div id="aiResponse" class="leading-relaxed text-gray-200 text-lg whitespace-pre-wrap"></div>
        </div>

        <div class="glass rounded-2xl p-2 flex items-center shadow-2xl border border-blue-500/20">
            <input id="userInput" type="text" placeholder="اسأل عن برمجة، اختراق أخلاقي، تقنية..." 
                   class="bg-transparent flex-1 p-4 outline-none text-lg">
            <button onclick="askHnafy()" id="sendBtn" 
                    class="bg-blue-600 hover:bg-blue-500 transition-all px-6 py-3 rounded-xl font-bold text-white shadow-lg flex items-center gap-2">
                <span>إرسال</span>
                <div id="loader" class="hidden h-4 w-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
        </div>
    </main>

    <script>
        const API_KEY = "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";

        async function askHnafy() {
            const input = document.getElementById('userInput');
            const resultBox = document.getElementById('resultBox');
            const aiResponse = document.getElementById('aiResponse');
            const loader = document.getElementById('loader');
            const sendBtn = document.getElementById('sendBtn');

            if (!input.value.trim()) return;

            resultBox.classList.remove('hidden');
            loader.classList.remove('hidden');
            aiResponse.innerText = "جارٍ التحميل...";
            sendBtn.disabled = true;

            // حفظ قيمة البحث مؤقتاً
            const searchQuery = input.value;
            
            // مسح حقل البحث
            input.value = '';

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { 
                                role: "system", 
                                content: `أنت El-hnafy AI، خبير في:
                                1. البرمجة (جميع اللغات: Python, JavaScript, Java, C++, وغيرها)
                                2. الأمن السيبراني والاختراق الأخلاقي (لأغراض تعليمية فقط)
                                3. التكنولوجيا والشبكات والأنظمة
                                4. قواعد البيانات وتطوير الويب والتطبيقات
                                
                                مهمتك: تقديم إجابات دقيقة ومفيدة مع أمثلة عملية. عند كتابة أكواد، استخدم تنسيقاً واضحاً.
                                ملاحظة: في مواضيع الاختراق، أكد على الجانب الأخلاقي والتعليمي.`
                            },
                            { role: "user", content: searchQuery }
                        ],
                        temperature: 0.6
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    let content = data.choices[0].message.content;
                    
                    // تحسين عرض الأكواد
                    content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                        return `<div class="code-block"><code>${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></div>`;
                    });
                    
                    aiResponse.innerHTML = content;
                } else {
                    aiResponse.innerText = "خطأ: لم يتم استلام رد صحيح";
                }

            } catch (error) {
                console.error("Error:", error);
                if (error.message.includes("401")) {
                    aiResponse.innerText = "خطأ: المفتاح غير صالح";
                } else if (error.message.includes("Failed to fetch")) {
                    aiResponse.innerText = "خطأ: فشل الاتصال بالإنترنت";
                } else {
                    aiResponse.innerText = "خطأ: " + error.message;
                }
            } finally {
                loader.classList.add('hidden');
                sendBtn.disabled = false;
            }
        }

        function copyText() {
            const text = document.getElementById('aiResponse').innerText;
            navigator.clipboard.writeText(text);
            
            // تأثير مؤقت للنسخ
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "تم النسخ!";
            setTimeout(() => {
                btn.innerText = originalText;
            }, 1500);
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askHnafy();
        });

        // أمثلة سريعة للتوجيه
        const examples = [
            "اكتب كود Python لقراءة ملف",
            "شرح ثغرة XSS",
            "أساسيات الشبكات",
            "كيفية عمل هجوم SQL Injection"
        ];
        
        console.log("💡 أمثلة للأسئلة:", examples.join(", "));
    </script>
</body>
</html>
