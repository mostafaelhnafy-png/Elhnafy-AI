<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El-hnafy AI | خبير البرمجة والتقنية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0f1e;
            color: #e5e7eb;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }
        
        body.light-mode {
            background: #f8fafc;
            color: #1e293b;
        }
        
        body.light-mode .message-user {
            background: #eef2ff;
            color: #1e293b;
        }
        
        body.light-mode .message-ai {
            background: #ffffff;
            color: #1e293b;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        body.light-mode .code-block {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
        }
        
        body.light-mode .code-header {
            background: #e2e8f0;
            color: #334155;
        }
        
        body.light-mode .file-item {
            background: #e2e8f0;
            color: #334155;
        }
        
        /* شريط علوي شفاف */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            background: linear-gradient(to bottom, rgba(10, 15, 30, 0.9), transparent);
            backdrop-filter: blur(8px);
        }
        
        body.light-mode .top-bar {
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.9), transparent);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        /* الأزرار العلوية */
        .top-btn {
            background: transparent;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #9ca3af;
            transition: all 0.2s ease;
            font-size: 1.3rem;
        }
        
        .top-btn:hover {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            transform: scale(1.05);
        }
        
        /* القائمة الجانبية */
        .sidebar-menu {
            position: fixed;
            top: 80px;
            left: 24px;
            width: 280px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 16px;
            display: none;
            z-index: 100;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        body.light-mode .sidebar-menu {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #1e293b;
        }
        
        .sidebar-menu.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .menu-item {
            padding: 14px 16px;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }
        
        .menu-item:hover {
            background: rgba(59, 130, 246, 0.15);
            transform: translateX(5px);
        }
        
        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 16px;
            margin-top: 8px;
        }
        
        /* المحتوى الرئيسي */
        .main-content {
            max-width: 900px;
            margin: 100px auto 100px;
            padding: 0 24px;
        }
        
        /* حاوية المحادثة */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            min-height: calc(100vh - 250px);
            max-height: calc(100vh - 250px);
            overflow-y: auto;
            padding: 10px 0;
        }
        
        /* تنسيق الرسائل */
        .message-user {
            align-self: flex-end;
            max-width: 80%;
            background: rgba(59, 130, 246, 0.15);
            padding: 16px 22px;
            border-radius: 28px 28px 8px 28px;
            margin-left: auto;
            animation: messageSlide 0.3s ease;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .message-ai {
            align-self: flex-start;
            max-width: 85%;
            background: rgba(16, 185, 129, 0.1);
            padding: 16px 22px;
            border-radius: 28px 28px 28px 8px;
            margin-right: auto;
            animation: messageSlide 0.3s ease;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .user-header {
            color: #60a5fa;
        }
        
        .ai-header {
            color: #34d399;
        }
        
        .message-content {
            line-height: 1.7;
            font-size: 1.05rem;
            word-wrap: break-word;
        }
        
        /* تنسيق الملفات المرفوعة داخل الرسالة */
        .uploaded-file-info {
            background: rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 12px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        
        .uploaded-image-preview {
            max-width: 100px;
            max-height: 100px;
            border-radius: 12px;
            object-fit: cover;
        }
        
        .file-details {
            flex: 1;
        }
        
        .file-name {
            font-weight: 600;
            color: #60a5fa;
        }
        
        .file-size {
            font-size: 0.8rem;
            color: #9ca3af;
        }
        
        /* الأكواد البرمجية */
        .code-block {
            background: #1a1f2e;
            border-radius: 16px;
            margin: 16px 0;
            overflow: hidden;
            border: 1px solid #2d3748;
            direction: ltr;
        }
        
        .code-header {
            background: #252d3d;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #374151;
            font-size: 0.9rem;
        }
        
        .code-content {
            padding: 16px;
            overflow-x: auto;
        }
        
        .code-content code {
            font-family: 'Fira Code', monospace;
            color: #e5e7eb;
            font-size: 0.95rem;
        }
        
        /* أزرار الأكواد */
        .code-btn {
            background: rgba(59, 130, 246, 0.2);
            border: none;
            color: #e5e7eb;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-left: 8px;
        }
        
        .code-btn:hover {
            background: rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }
        
        /* مربع الإدخال */
        .input-area {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 40;
        }
        
        body.light-mode .input-area {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .input-area:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
        }
        
        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 20px;
            font-size: 1rem;
            color: inherit;
            outline: none;
            font-family: 'Cairo', sans-serif;
        }
        
        #userInput::placeholder {
            color: #9ca3af;
        }
        
        .attach-btn {
            background: transparent;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #9ca3af;
            transition: all 0.2s ease;
            position: relative;
        }
        
        .attach-btn:hover {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }
        
        .attach-btn input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        #sendBtn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 50px;
            padding: 12px 28px;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }
        
        #sendBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
        }
        
        #sendBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* معاينة الملفات قبل الإرسال */
        .file-preview {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 35;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.3s ease;
        }
        
        .file-item {
            background: rgba(59, 130, 246, 0.2);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .file-item button {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .image-preview-container {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 36;
        }
        
        .image-preview {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid #3b82f6;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        
        /* نافذة منبثقة */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }
        
        .modal-content {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 24px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* شريط التمرير */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 10px;
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .message-user, .message-ai {
                max-width: 95%;
            }
            
            .input-area {
                width: 95%;
                bottom: 16px;
            }
            
            .file-preview, .image-preview-container {
                width: 95%;
                bottom: 90px;
            }
            
            .image-preview-container {
                bottom: 160px;
            }
        }
    </style>
</head>
<body>
    <!-- الشريط العلوي -->
    <div class="top-bar">
        <button class="top-btn" onclick="toggleSidebar()" id="menuBtn">
            <i class="fas fa-bars"></i>
        </button>
        <span class="logo">El-hnafy AI</span>
        <button class="top-btn" onclick="startNewChat()" title="محادثة جديدة">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <!-- القائمة الجانبية -->
    <div class="sidebar-menu" id="sidebarMenu">
        <div class="menu-item" onclick="showUsage()">
            <i class="fas fa-moon"></i>
            <span>وضع الاستخدام</span>
        </div>
        <div class="menu-item" onclick="showAbout()">
            <i class="fas fa-info-circle"></i>
            <span>حول</span>
        </div>
        <div class="menu-item" onclick="showDeveloper()">
            <i class="fas fa-code"></i>
            <span>المطور</span>
        </div>
        <div class="theme-toggle">
            <span><i class="fas fa-palette ml-2"></i> الوضع الليلي</span>
            <button onclick="toggleTheme()" style="background: #3b82f6; border: none; color: white; padding: 6px 16px; border-radius: 30px; cursor: pointer; font-size: 0.9rem;">تغيير</button>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <div class="chat-container" id="chatContainer">
            <div id="currentChat">
                <!-- رسالة الترحيب -->
                <div class="message-ai">
                    <div class="message-header ai-header">
                        <i class="fas fa-robot"></i>
                        <span>El-hnafy AI</span>
                    </div>
                    <div class="message-content">
                        👋 مرحباً! أنا El-hnafy AI، خبير في البرمجة والتكنولوجيا.<br>
                        📎 يمكنك رفع صور أو ملفات وسأقوم بتحليلها ومساعدتك!
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- معاينة الصور -->
    <div class="image-preview-container hidden" id="imagePreviewContainer"></div>

    <!-- معاينة الملفات -->
    <div class="file-preview hidden" id="filePreview"></div>

    <!-- مربع الإدخال -->
    <div class="input-area">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-paperclip"></i>
            <input type="file" id="fileInput" multiple onchange="handleFiles(this.files)">
        </button>
        <input type="text" id="userInput" placeholder="اكتب سؤالك هنا أو ارفع ملفاً..." autocomplete="off">
        <button onclick="askHnafy()" id="sendBtn">
            <span>إرسال</span>
            <div id="loader" class="hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        </button>
    </div>

    <!-- نافذة منبثقة -->
    <div class="modal" id="infoModal" onclick="hideModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 class="text-xl font-bold" id="modalTitle"></h3>
                <button onclick="hideModal()" style="background: transparent; border: none; color: #9ca3af; cursor: pointer; font-size: 1.2rem;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modalContent" style="line-height: 1.8;"></div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let uploadedFiles = [];
        let uploadedFilesData = []; // لتخزين بيانات الملفات للإرسال

        // تحميل الثيم المحفوظ
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
        }

        // شات جديد
        function startNewChat() {
            document.getElementById('currentChat').innerHTML = `
                <div class="message-ai">
                    <div class="message-header ai-header">
                        <i class="fas fa-robot"></i>
                        <span>El-hnafy AI</span>
                    </div>
                    <div class="message-content">
                        👋 مرحباً! أنا El-hnafy AI، خبير في البرمجة والتكنولوجيا.<br>
                        📎 يمكنك رفع صور أو ملفات وسأقوم بتحليلها ومساعدتك!
                    </div>
                </div>
            `;
            uploadedFiles = [];
            uploadedFilesData = [];
            updateFilePreview();
        }

        // إضافة رسالة المستخدم مع الملفات
        function addUserMessage(text, files = []) {
            const chatDiv = document.getElementById('currentChat');
            let filesHtml = '';
            
            if (files.length > 0) {
                filesHtml = '<div style="margin-top: 12px; display: flex; flex-direction: column; gap: 8px;">';
                files.forEach(file => {
                    if (file.type.startsWith('image/')) {
                        filesHtml += `
                            <div class="uploaded-file-info">
                                <img src="${file.data}" class="uploaded-image-preview" alt="صورة مرفوعة">
                                <div class="file-details">
                                    <div class="file-name">📷 ${file.name}</div>
                                    <div class="file-size">${(file.size/1024).toFixed(2)} KB</div>
                                </div>
                            </div>
                        `;
                    } else {
                        filesHtml += `
                            <div class="uploaded-file-info">
                                <i class="fas ${getFileIcon(file.type)}" style="font-size: 2rem; color: #60a5fa;"></i>
                                <div class="file-details">
                                    <div class="file-name">📄 ${file.name}</div>
                                    <div class="file-size">${(file.size/1024).toFixed(2)} KB</div>
                                </div>
                            </div>
                        `;
                    }
                });
                filesHtml += '</div>';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-user';
            messageDiv.innerHTML = `
                <div class="message-header user-header">
                    <i class="fas fa-user"></i>
                    <span>أنت</span>
                </div>
                <div class="message-content">
                    ${text ? escapeHtml(text) : ''}
                    ${filesHtml}
                </div>
            `;
            chatDiv.appendChild(messageDiv);
            scrollToBottom();
        }

        // إضافة رسالة المساعد
        function addAIMessage(html) {
            const chatDiv = document.getElementById('currentChat');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-ai';
            messageDiv.innerHTML = `
                <div class="message-header ai-header">
                    <i class="fas fa-robot"></i>
                    <span>El-hnafy AI</span>
                </div>
                <div class="message-content">${html}</div>
            `;
            chatDiv.appendChild(messageDiv);
            scrollToBottom();
        }

        // دالة مساعدة لتحويل النص الآمن
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // التمرير للأسفل
        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        // القائمة الجانبية
        function toggleSidebar() {
            document.getElementById('sidebarMenu').classList.toggle('show');
        }

        // تغيير الثيم
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        // عرض المعلومات
        function showUsage() {
            showModal('وضع الاستخدام', `
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <p><i class="fas fa-plus text-blue-400 ml-2"></i> محادثة جديدة: الزر الأيسر العلوي</p>
                    <p><i class="fas fa-moon text-blue-400 ml-2"></i> الوضع الليلي: من القائمة الجانبية</p>
                    <p><i class="fas fa-paperclip text-blue-400 ml-2"></i> رفع ملفات: أيقونة المشبك - سأقوم بتحليلها</p>
                    <p><i class="fas fa-image text-blue-400 ml-2"></i> الصور: يمكنني رؤيتها ووصفها</p>
                    <p><i class="fas fa-code text-blue-400 ml-2"></i> الأكواد: يمكن نسخها أو تحميلها</p>
                </div>
            `);
            toggleSidebar();
        }

        function showAbout() {
            showModal('حول El-hnafy AI', `
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <p class="text-xl font-bold" style="background: linear-gradient(135deg, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">El-hnafy AI v9.0</p>
                    <p>تم الإنشاء بواسطة <span style="color: #60a5fa;">مصطفى إسماعيل الحنفي</span></p>
                    <p>خبير في البرمجة والتكنولوجيا والأمن السيبراني</p>
                    <p>✨ يدعم تحليل الصور والملفات</p>
                </div>
            `);
            toggleSidebar();
        }

        function showDeveloper() {
            showModal('المطور', `
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <p class="text-xl font-bold">مصطفى إسماعيل الحنفي</p>
                    <p>مبرمج ومطور ويب متخصص في الذكاء الاصطناعي</p>
                    <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px;">
                        <a href="https://wa.me/201211924535" style="background: #25D36620; padding: 10px; border-radius: 30px; text-align: center; text-decoration: none; color: inherit;"><i class="fab fa-whatsapp text-green-500 ml-2"></i> واتساب</a>
                        <a href="https://t.me/01211924535" style="background: #0088cc20; padding: 10px; border-radius: 30px; text-align: center; text-decoration: none; color: inherit;"><i class="fab fa-telegram text-blue-400 ml-2"></i> تلجرام</a>
                        <a href="https://www.facebook.com/profile.php?id=61578165896542" style="background: #1877f220; padding: 10px; border-radius: 30px; text-align: center; text-decoration: none; color: inherit;"><i class="fab fa-facebook text-blue-600 ml-2"></i> فيسبوك</a>
                    </div>
                </div>
            `);
            toggleSidebar();
        }

        function showModal(title, content) {
            document.getElementById('modalTitle').innerHTML = title;
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('infoModal').style.display = 'flex';
        }

        function hideModal() {
            document.getElementById('infoModal').style.display = 'none';
        }

        // أيقونة الملف
        function getFileIcon(type) {
            if (type.startsWith('image/')) return 'fa-image';
            if (type.includes('pdf')) return 'fa-file-pdf';
            if (type.includes('word') || type.includes('document')) return 'fa-file-word';
            if (type.includes('excel') || type.includes('sheet')) return 'fa-file-excel';
            if (type.includes('zip') || type.includes('rar')) return 'fa-file-archive';
            if (type.includes('text') || type.includes('javascript') || type.includes('python') || type.includes('html')) return 'fa-file-code';
            return 'fa-file';
        }

        // معالجة رفع الملفات
        function handleFiles(files) {
            const preview = document.getElementById('filePreview');
            const imagePreview = document.getElementById('imagePreviewContainer');
            
            for (let file of files) {
                // تخزين الملف للإرسال
                const reader = new FileReader();
                reader.onload = (e) => {
                    uploadedFilesData.push({
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: e.target.result,
                        lastModified: file.lastModified
                    });
                };
                reader.readAsDataURL(file);
                
                uploadedFiles.push(file);
                
                // معاينة الصور
                if (file.type.startsWith('image/')) {
                    const imgReader = new FileReader();
                    imgReader.onload = (e) => {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'image-preview';
                        img.onclick = () => {
                            // تكبير الصورة عند النقر
                            showModal('معاينة الصورة', `<img src="${e.target.result}" style="max-width: 100%; border-radius: 16px;">`);
                        };
                        imagePreview.appendChild(img);
                    };
                    imgReader.readAsDataURL(file);
                }
                
                // معاينة الملف
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <i class="fas ${getFileIcon(file.type)}"></i>
                    <span>${file.name.substring(0, 20)}${file.name.length > 20 ? '...' : ''}</span>
                    <button onclick="removeFile('${file.name}')"><i class="fas fa-times"></i></button>
                `;
                preview.appendChild(item);
            }
            
            if (files.length > 0) {
                preview.classList.remove('hidden');
                if (imagePreview.children.length > 0) {
                    imagePreview.classList.remove('hidden');
                }
            }
        }

        // إزالة ملف
        function removeFile(fileName) {
            uploadedFiles = uploadedFiles.filter(f => f.name !== fileName);
            uploadedFilesData = uploadedFilesData.filter(f => f.name !== fileName);
            updateFilePreview();
        }

        // تحديث معاينة الملفات
        function updateFilePreview() {
            const preview = document.getElementById('filePreview');
            const imagePreview = document.getElementById('imagePreviewContainer');
            
            if (uploadedFiles.length === 0) {
                preview.classList.add('hidden');
                imagePreview.classList.add('hidden');
                preview.innerHTML = '';
                imagePreview.innerHTML = '';
            }
        }

        // تحضير معلومات الملفات للإرسال
        function prepareFilesInfo() {
            if (uploadedFilesData.length === 0) return '';
            
            let filesInfo = '\n\n[الملفات المرفوعة من المستخدم:\n';
            uploadedFilesData.forEach(file => {
                filesInfo += `- الملف: ${file.name}\n`;
                filesInfo += `  النوع: ${file.type}\n`;
                filesInfo += `  الحجم: ${(file.size/1024).toFixed(2)} KB\n`;
                
                // إذا كانت الصورة، نضيف معلومات إضافية
                if (file.type.startsWith('image/')) {
                    filesInfo += `  (هذه صورة، قم بتحليلها ووصفها للمستخدم)\n`;
                }
            });
            filesInfo += ']';
            
            return filesInfo;
        }

        // تنسيق الردود
        function formatResponse(content) {
            // أكواد طويلة
            content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                const language = lang || 'text';
                const cleanCode = escapeHtml(code);
                return `
                    <div class="code-block">
                        <div class="code-header">
                            <span><i class="fas fa-code ml-2"></i>${language}</span>
                            <div>
                                <button class="code-btn" onclick="copyCode(this)"><i class="fas fa-copy"></i> نسخ</button>
                                <button class="code-btn" onclick="downloadCode(this)"><i class="fas fa-download"></i> تحميل</button>
                            </div>
                        </div>
                        <pre class="code-content"><code>${cleanCode}</code></pre>
                    </div>
                `;
            });
            
            // أكواد قصيرة
            content = content.replace(/`(.*?)`/g, '<code style="background: #1e293b; color: #34d399; padding: 2px 6px; border-radius: 6px; font-family: monospace; direction: ltr; display: inline-block;">$1</code>');
            
            // عناوين
            content = content.replace(/^# (.*$)/gm, '<h2 style="font-size: 1.5rem; font-weight: 700; color: #60a5fa; margin: 16px 0 8px;">$1</h2>');
            content = content.replace(/^## (.*$)/gm, '<h3 style="font-size: 1.25rem; font-weight: 600; color: #34d399; margin: 12px 0 6px;">$1</h3>');
            
            // نص غامق
            content = content.replace(/\*\*(.*?)\*\*/g, '<strong style="color: #34d399;">$1</strong>');
            
            // نص مائل
            content = content.replace(/\*(.*?)\*/g, '<em style="color: #94a3b8;">$1</em>');
            
            return content;
        }

        // نسخ كود
        function copyCode(btn) {
            const code = btn.closest('.code-block').querySelector('code').innerText;
            navigator.clipboard.writeText(code);
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> تم!';
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 2000);
        }

        // تحميل كود
        function downloadCode(btn) {
            const code = btn.closest('.code-block').querySelector('code').innerText;
            const blob = new Blob([code], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'code.txt';
            a.click();
        }

        // إرسال السؤال مع الملفات
        async function askHnafy() {
            const input = document.getElementById('userInput');
            const question = input.value.trim();
            
            if (!question && uploadedFiles.length === 0) return;

            // إضافة رسالة المستخدم مع الملفات المرفوعة
            addUserMessage(question, uploadedFilesData);
            input.value = '';

            // تحضير معلومات الملفات للإرسال
            const filesInfo = prepareFilesInfo();
            const fullQuestion = question + filesInfo;

            // مؤشر التحميل
            const thinkingId = 'thinking-' + Date.now();
            document.getElementById('currentChat').innerHTML += `
                <div class="message-ai" id="${thinkingId}">
                    <div class="message-header ai-header">
                        <i class="fas fa-robot"></i>
                        <span>El-hnafy AI</span>
                    </div>
                    <div class="message-content">
                        <i class="fas fa-spinner fa-spin"></i> جارٍ تحليل الملفات والتفكير...
                    </div>
                </div>
            `;
            scrollToBottom();

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { 
                                role: "system", 
                                content: `أنت El-hnafy AI، خبير برمجة وتكنولوجيا. 
                                إذا رفع المستخدم صوراً، قم بتحليلها ووصفها.
                                إذا رفع ملفات، اقرأها وحللها وساعد المستخدم.
                                أجب بالعربية الفصحى بوضوح وإتقان.
                                كن دقيقاً في تحليل الملفات والصور.`
                            },
                            { role: "user", content: fullQuestion }
                        ],
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });

                // إزالة مؤشر التحميل
                document.getElementById(thinkingId)?.remove();

                if (!response.ok) throw new Error('خطأ في الاتصال');

                const data = await response.json();
                const content = data.choices[0].message.content;
                
                // إضافة الرد المنسق
                addAIMessage(formatResponse(content));

                // مسح الملفات بعد الإرسال
                uploadedFiles = [];
                uploadedFilesData = [];
                updateFilePreview();

            } catch (error) {
                document.getElementById(thinkingId)?.remove();
                addAIMessage(`<p style="color: #ef4444;">خطأ: ${error.message}</p>`);
            }
        }

        // Enter للإرسال
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askHnafy();
            }
        });

        // إغلاق القائمة عند النقر خارجها
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('sidebarMenu');
            const btn = document.getElementById('menuBtn');
            if (menu && !menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('show');
            }
        });
    </script>
</body>
